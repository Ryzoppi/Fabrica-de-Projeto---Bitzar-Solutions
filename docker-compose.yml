  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    networks:
      - app-network
    volumes:
      - ollama_data:/root/.ollama

  csharp-api:
    build: ./Api
    container_name: csharp-api
    ports:
      - "5000:5000"
    depends_on:
      # - postgres
      - ollama
    environment:
      - ASPNETCORE_URLS=http://+:5000
    networks:
      - app-network

  python-api:
    build: ./PythonApi
    container_name: python-api
    ports:
      - "8000:8000"
    depends_on:
      - ollama
      # - postgres
    networks:
      - app-network

